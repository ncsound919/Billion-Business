name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker build -t grader:latest .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 5

  health-check:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start server and verify health endpoints
        run: |
          # Start server in background
          npm run start &
          SERVER_PID=$!
          sleep 3
          
          # Check /healthz endpoint
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/healthz)
          echo "Health endpoint status: $HEALTH"
          
          # Check /readyz endpoint
          READY=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/readyz)
          echo "Readiness endpoint status: $READY"
          
          # Kill server
          kill $SERVER_PID 2>/dev/null || true
          
          # Verify both endpoints return 200
          [ "$HEALTH" = "200" ] && [ "$READY" = "200" ] && exit 0 || exit 1
        env:
          NODE_ENV: production
          PORT: 3000
